name: Agentic Fabric Production CI Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-system:
    runs-on: ubuntu-latest

    steps:
    - name: Check out Repository Code
      uses: actions/checkout@v4

    - name: Provision Isolated Python Environment (3.11)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        # 💡 SENIOR FIX: Removed 'cache' hook to prevent early file-matching race errors

    - name: Install System Architecture Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Strict Python Syntax and Compile Check
      run: |
        # Validates file structures against IndentationErrors or SyntaxErrors
        python -m py_compile advanced_orchestrator.py

    - name: Verify Environment Configuration Stability
      run: |
        # Verifies core file deployment boundaries
        test -f advanced_orchestrator.py
        test -f ARCHITECTURE.md
